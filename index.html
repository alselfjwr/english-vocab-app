<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English — 英語1000 学習アプリ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1c1e; --sub: #6b6b70; --line: #e0e1e6; --paper: #f8f9fb; --red: #1f51c8;
    --red-soft: #ecf1fd; --green: #2e7d4f; --green-soft: #e8f5ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--paper); color: var(--ink); padding-bottom: 90px; }
  .enfont { font-family: 'Inter', sans-serif; }
  button { font-family: inherit; cursor: pointer; }

  header { padding: 20px 20px 0; max-width: 1120px; margin: 0 auto; }
  header h1 { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -0.01em; cursor: pointer; }
  header h1 span { color: var(--red); font-size: 17px; font-weight: 700; margin-left: 8px; font-family: 'Noto Sans JP', sans-serif; }
  .voice-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .voice-status { font-size: 12px; color: var(--sub); }
  .voice-status.ok::before { content: "● "; color: var(--green); }
  .voice-status.ng::before { content: "● "; color: var(--red); }
  .speed-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
  .speed-toggle button { border: none; background: none; padding: 5px 14px; font-size: 12.5px; font-weight: 500; color: var(--sub); }
  .speed-toggle button.on { background: var(--ink); color: #fff; }

  .tabs { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #fff; border-top: 1px solid var(--line); z-index: 50; padding-bottom: env(safe-area-inset-bottom); }
  .tabs button { flex: 1; border: none; background: none; padding: 13px 0 11px; font-size: 13px; font-weight: 700; color: var(--sub); border-top: 3px solid transparent; margin-top: -1px; }
  .tabs button.on { color: var(--red); border-top-color: var(--red); }

  main { max-width: 1120px; margin: 0 auto; padding: 16px 20px 40px; }

  /* ---- 一覧 ---- */
  .search-row { position: sticky; top: 0; background: var(--paper); padding: 10px 0; z-index: 10; display: flex; gap: 8px; }
  .search-row input { flex: 1; min-width: 0; padding: 12px 16px; font-size: 16px; border: 1.5px solid var(--line); border-radius: 10px; background: #fff; font-family: inherit; outline: none; }
  .search-row input:focus { border-color: var(--red); }
  .search-row button { border: none; background: var(--red); color: #fff; border-radius: 10px; padding: 0 22px; font-size: 14.5px; font-weight: 700; white-space: nowrap; }
  .search-row button:active { opacity: .85; }
  .chips { display: flex; gap: 8px; overflow-x: auto; padding: 4px 0 12px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .chips::-webkit-scrollbar { display: none; }
  .chips button { white-space: nowrap; border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 500; color: var(--ink); }
  .chips button.on { background: var(--red); border-color: var(--red); color: #fff; }
  .chips button .n { color: var(--sub); font-size: 11px; margin-left: 4px; }
  .chips button.on .n { color: rgba(255,255,255,.75); }

  .result-count { font-size: 13px; color: var(--sub); margin: 4px 0 14px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 12px; }
  .sec-head { grid-column: 1 / -1; font-size: 18px; font-weight: 700; margin-top: 18px; display: flex; align-items: center; gap: 10px; }
  .sec-head::before { content: ""; display: block; width: 12px; height: 12px; background: var(--red); }
  .card { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 16px 18px 14px; position: relative; cursor: pointer; transition: border-color .12s; }
  .card:active { border-color: var(--red); }
  .card .en { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 30px; line-height: 1.3; padding-right: 56px; }
  .card .jp { margin-top: 6px; font-size: 16px; font-weight: 500; }
  .card .note { margin-top: 3px; font-size: 12.5px; color: var(--sub); }
  .card .spk { position: absolute; top: 12px; right: 44px; border: none; background: var(--red-soft); color: var(--red); width: 32px; height: 32px; border-radius: 50%; font-size: 15px; display: flex; align-items: center; justify-content: center; }
  .card .fav { position: absolute; top: 12px; right: 8px; border: none; background: none; font-size: 19px; color: #d9d4cb; width: 32px; height: 32px; }
  .card .fav.on { color: #e8a91d; }
  .card.playing { border-color: var(--red); box-shadow: 0 0 0 2px var(--red-soft); }

  /* ---- フラッシュカード ---- */
  .fc-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  select { padding: 9px 12px; font-size: 14px; border: 1.5px solid var(--line); border-radius: 8px; background: #fff; font-family: inherit; max-width: 100%; }
  .btn { border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 9px 16px; font-size: 13.5px; font-weight: 500; }
  .btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
  .btn:disabled { opacity: .4; cursor: default; }
  .fc-stage { max-width: 560px; margin: 0 auto; }
  .fc-counter { text-align: center; font-size: 13px; color: var(--sub); margin-bottom: 10px; }
  .fc-card { background: #fff; border: 1.5px solid var(--line); border-radius: 16px; min-height: 280px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 36px 28px; cursor: pointer; user-select: none; -webkit-user-select: none; }
  .fc-card .big { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 44px; line-height: 1.3; }
  .fc-card .big.jpfront { font-family: 'Noto Sans JP', sans-serif; font-size: 32px; }
  .fc-card .answer { margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--line); width: 100%; }
  .fc-card .answer .a-main { font-size: 26px; font-weight: 700; }
  .fc-card .answer .a-main.enfont { font-size: 38px; }
  .fc-card .answer .a-note { margin-top: 6px; font-size: 13px; color: var(--sub); }
  .fc-card .hint { margin-top: 22px; font-size: 12.5px; color: var(--sub); }
  .fc-nav { display: flex; gap: 10px; margin-top: 16px; justify-content: center; }
  .fc-nav .btn { padding: 12px 22px; font-size: 15px; }
  .fc-empty { text-align: center; color: var(--sub); padding: 60px 0; font-size: 14px; }

  /* ---- クイズ ---- */
  .qz-stage { max-width: 560px; margin: 0 auto; }
  .qz-progress { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; margin-bottom: 18px; }
  .qz-progress div { height: 100%; background: var(--red); transition: width .25s; }
  .qz-q { background: #fff; border: 1.5px solid var(--line); border-radius: 16px; padding: 32px 24px; text-align: center; margin-bottom: 16px; }
  .qz-q .big { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 40px; line-height: 1.3; }
  .qz-q .spk-big { margin-top: 12px; border: none; background: var(--red-soft); color: var(--red); border-radius: 999px; padding: 8px 22px; font-size: 14px; font-weight: 700; }
  .qz-opts { display: grid; gap: 10px; }
  .qz-opts button { text-align: left; border: 1.5px solid var(--line); background: #fff; border-radius: 12px; padding: 15px 18px; font-size: 16px; font-weight: 500; }
  .qz-opts button.correct { border-color: var(--green); background: var(--green-soft); color: var(--green); font-weight: 700; }
  .qz-opts button.wrong { border-color: var(--red); background: var(--red-soft); color: var(--red); }
  .qz-opts button:disabled { cursor: default; }
  .qz-next { margin-top: 16px; text-align: center; }
  .qz-result { text-align: center; padding: 30px 0 10px; }
  .qz-result .score { font-size: 52px; font-weight: 800; font-family: 'Inter', sans-serif; }
  .qz-result .score span { font-size: 22px; color: var(--sub); font-weight: 500; }
  .qz-result p { color: var(--sub); margin: 8px 0 22px; font-size: 14px; }
  .qz-review { max-width: 560px; margin: 26px auto 0; text-align: left; }
  .qz-review h3 { font-size: 14px; color: var(--sub); margin-bottom: 10px; font-weight: 700; }
  .qz-review .item { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .qz-review .item .w { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 20px; }
  .qz-review .item .m { font-size: 13.5px; color: var(--sub); text-align: right; }

  /* ---- 会話 ---- */
  .tk-mode { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
  .tk-mode button { border: none; background: none; padding: 9px 16px; font-size: 13.5px; font-weight: 500; color: var(--sub); }
  .tk-mode button.on { background: var(--ink); color: #fff; }
  .tk-wrap { max-width: 680px; margin: 0 auto; }
  .ph-row { background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; position: relative; cursor: pointer; transition: border-color .12s; }
  .ph-row:active { border-color: var(--red); }
  .ph-row.playing { border-color: var(--red); box-shadow: 0 0 0 2px var(--red-soft); }
  .ph-row .en { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 19px; line-height: 1.4; padding-right: 88px; }
  .ph-row .jp { margin-top: 4px; font-size: 14px; }
  .ph-row .note { margin-top: 3px; font-size: 12.5px; color: var(--sub); }
  .ph-row .spk { position: absolute; top: 12px; right: 50px; border: none; background: var(--red-soft); color: var(--red); width: 34px; height: 34px; border-radius: 50%; font-size: 15px; display: flex; align-items: center; justify-content: center; }
  .ph-row .mic { position: absolute; top: 12px; right: 8px; border: none; background: var(--green-soft); color: var(--green); width: 34px; height: 34px; border-radius: 50%; font-size: 15px; display: flex; align-items: center; justify-content: center; }
  .ph-row .mic.rec { background: var(--red); color: #fff; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
  .mic-result { margin-top: 8px; font-size: 13.5px; font-weight: 700; }
  .mic-result .said { font-weight: 400; color: var(--sub); }
  .mic-result.good { color: var(--green); }
  .mic-result.mid { color: #b8860b; }
  .mic-result.bad { color: var(--red); }
  .dlg-roles { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .dlg-roles .lbl { font-size: 13px; color: var(--sub); }
  .bubble-row { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 12px; }
  .bubble-row.B { align-items: flex-end; }
  .bubble-row .who { font-size: 11px; color: var(--sub); margin: 0 6px 3px; }
  .bubble { max-width: 86%; background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 11px 15px; cursor: pointer; }
  .bubble-row.B .bubble { background: var(--red-soft); border-color: transparent; }
  .bubble .en { font-weight: 700; font-size: 16.5px; font-family: 'Inter', sans-serif; line-height: 1.45; }
  .bubble .jp { font-size: 12.5px; color: var(--sub); margin-top: 4px; }
  .bubble.yours { border: 1.5px dashed var(--red); background: #fff; }
  .bubble.yours .prompt { font-size: 12px; color: var(--red); font-weight: 700; margin-bottom: 4px; }
  .dlg-controls { display: flex; gap: 10px; margin: 16px 0; justify-content: center; flex-wrap: wrap; }
  .dlg-done { text-align: center; color: var(--green); font-weight: 700; padding: 10px 0 4px; }

  .banner { background: #fff8e6; border: 1px solid #f0dca8; border-radius: 10px; padding: 12px 16px; font-size: 13px; line-height: 1.7; margin-bottom: 16px; color: #6b5618; }
  #toTop { position: fixed; right: 16px; bottom: calc(72px + env(safe-area-inset-bottom)); width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--line); background: #fff; color: var(--ink); font-size: 19px; box-shadow: 0 2px 10px rgba(0,0,0,.12); z-index: 49; display: flex; align-items: center; justify-content: center; }
  .fc-card .big.long { font-size: 26px; }
  .fc-card .answer .a-main.enfont.long { font-size: 24px; }
  .qz-q .big.long { font-size: 23px; }
  @media (max-width: 600px) {
    .card .en { font-size: 26px; }
    .fc-card .big { font-size: 36px; }
    .fc-card .big.long { font-size: 22px; }
    .qz-q .big.long { font-size: 20px; }
  }
</style>
</head>
<body>
<header>
  <h1>English<span>英語 基本単語1000</span></h1>
  <div class="voice-row">
    <span id="voiceStatus" class="voice-status">音声を確認中…</span>
    <span class="speed-toggle">
      <button id="spdNormal" class="on">標準</button>
      <button id="spdSlow">ゆっくり</button>
    </span>
  </div>
</header>

<main>
  <div id="voiceBanner" class="banner" style="display:none">
    このブラウザに英語の音声が見つかりません。<b>Chrome</b> や <b>Safari</b> など最新のブラウザで開くと発音が再生できます。
  </div>

  <!-- 一覧 -->
  <div id="view-list">
    <div class="search-row">
      <input id="searchBox" type="search" placeholder="キーワード（日本語・英語）" autocomplete="off" enterkeyhint="search">
      <button id="searchBtn">🔍 検索</button>
    </div>
    <div class="chips" id="chips"></div>
    <div class="result-count" id="resultCount"></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- フラッシュカード -->
  <div id="view-flash" style="display:none">
    <div class="fc-controls">
      <select id="fcCat"></select>
      <select id="fcDir">
        <option value="en">英語 → 日本語</option>
        <option value="jp">日本語 → 英語</option>
      </select>
      <button class="btn" id="fcShuffle">🔀 シャッフル</button>
      <label style="font-size:13px;color:var(--sub);display:flex;align-items:center;gap:5px">
        <input type="checkbox" id="fcAuto" checked> 自動発音
      </label>
    </div>
    <div class="fc-stage" id="fcStage"></div>
  </div>

  <!-- クイズ -->
  <div id="view-quiz" style="display:none">
    <div class="fc-controls">
      <select id="qzCat"></select>
      <button class="btn primary" id="qzStart">クイズ開始（10問）</button>
    </div>
    <div class="qz-stage" id="qzStage"></div>
  </div>

  <!-- 会話 -->
  <div id="view-talk" style="display:none">
    <div class="fc-controls">
      <select id="tkScene"></select>
      <span class="tk-mode">
        <button id="tkModePhrase" class="on">フレーズ</button>
        <button id="tkModeDialog">会話練習</button>
      </span>
    </div>
    <div class="tk-wrap" id="tkStage"></div>
  </div>
</main>

<button id="toTop" title="トップに戻る" aria-label="トップに戻る">↑</button>

<nav class="tabs">
  <button data-view="list" class="on">📖 単語帳</button>
  <button data-view="flash">🃏 フラッシュカード</button>
  <button data-view="quiz">✏️ クイズ</button>
  <button data-view="talk">💬 会話</button>
</nav>

<script>

/* ===== 音声 ===== Web Speech API で英語（en-US）を読み上げる */
let enVoice = null;
let rate = 1.0;
const hasMp3 = Object.keys(AUDIO_MAP).length > 0;
const player = new Audio();
function pickVoice() {
  const vs = speechSynthesis.getVoices().filter(v => v.lang.replace('_', '-').toLowerCase().startsWith('en'));
  if (!vs.length) return null;
  return vs.find(v => v.lang.toLowerCase().startsWith('en-us') && /samantha|google/i.test(v.name)) || vs.find(v => v.lang.toLowerCase().startsWith('en-us')) || vs[0];
}
function updateVoiceStatus() {
  enVoice = pickVoice();
  const el = document.getElementById('voiceStatus');
  if (hasMp3) {
    el.textContent = '発音: MP3';
    el.className = 'voice-status ok';
    document.getElementById('voiceBanner').style.display = 'none';
  } else if (enVoice) {
    el.textContent = '発音: ' + enVoice.name;
    el.className = 'voice-status ok';
    document.getElementById('voiceBanner').style.display = 'none';
  } else {
    el.textContent = '英語音声なし';
    el.className = 'voice-status ng';
    document.getElementById('voiceBanner').style.display = 'block';
  }
}
if ('speechSynthesis' in window) {
  updateVoiceStatus();
  speechSynthesis.onvoiceschanged = updateVoiceStatus;
}
function stopSpeak() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  player.pause();
}
function speak(text, onend) {
  stopSpeak();
  const id = AUDIO_MAP[text];
  if (id !== undefined) {
    player.src = 'audio/' + id + '.mp3';
    player.playbackRate = rate;
    if ('preservesPitch' in player) player.preservesPitch = true;
    player.onended = onend || null;
    player.play().catch(() => speakTTS(text, onend));
    return;
  }
  speakTTS(text, onend);
}
function speakTTS(text, onend) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  if (enVoice) u.voice = enVoice;
  u.rate = rate;
  if (onend) u.onend = onend;
  speechSynthesis.speak(u);
}
document.getElementById('spdNormal').onclick = e => { rate = 1.0; e.target.classList.add('on'); document.getElementById('spdSlow').classList.remove('on'); };

function matchesSearch(w, q) {
  if (!q) return true;
  return norm(w.en).includes(q) || norm(w.jp).includes(q) || norm(w.note || '').includes(q) || norm(w.secTitle).includes(q);
}

function renderList() {
  const q = norm(document.getElementById('searchBox').value.trim());

function catWords(val) {
  if (val === 'all') return ALL_WORDS;
  if (val === 'fav') return ALL_WORDS.filter(w => favs.has(w.id));
  if (val[0] === 'p') return PHRASE_WORDS.filter(w => w.secIdx === +val.slice(1));
  return ALL_WORDS.filter(w => w.secIdx === +val);
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuiz() {

        <button class="btn primary" onclick="document.getElementById('qzStart').click()">もう一度</button>

  const q = qz.qs[qz.i];
  stage.innerHTML = `
    <div class="qz-progress"><div style="width:${qz.i / qz.qs.length * 100}%"></div></div>
    <div class="qz-q">
      <div class="big enfont${q.w.en.length > 16 ? ' long' : ''}">${q.w.en}</div>
      <button class="spk-big" id="qzSpeak">🔊 もう一度聞く</button>

      ${q.opts.map((o, i) => `<button data-i="${i}">${o.jp}</button>`).join('')}
    </div>

  speak(q.w.en);
  document.getElementById('qzSpeak').onclick = () => speak(q.w.en);
  document.querySelectorAll('#qzOpts button').forEach(b => b.onclick = () => {
    const chosen = q.opts[+b.dataset.i];
    const correct = chosen === q.w;
    document.querySelectorAll('#qzOpts button').forEach((x, i) => {
      x.disabled = true;
      if (q.opts[i] === q.w) x.classList.add('correct');
      else if (x === b && !correct) x.classList.add('wrong');
    });
    if (correct) qz.score++;
    else qz.wrongs.push(q.w);
    document.getElementById('qzNext').innerHTML = `<button class="btn primary" id="qzGo">${qz.i === qz.qs.length - 1 ? '結果を見る' : '次の問題 ▶'}</button>`;
    document.getElementById('qzGo').onclick = () => { qz.i++; renderQuiz(); };
  });
}

/* ===== 会話 ===== */
const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null;
function simScore(said, target) {
  const tokenize = s => s.toLowerCase().replace(/[^a-z0-9' ]/g, ' ').split(/\s+/).filter(Boolean);
  const wa = tokenize(said), wb = tokenize(target);
  if (!wb.length) return 0;
  let hit = 0; const used = new Set();
  wb.forEach(w => {
    const i = wa.findIndex((x, ix) => !used.has(ix) && x === w);
    if (i >= 0) { hit++; used.add(i); }
  });
  return hit / wb.length;
}
function startMic(target, btn, out) {
  if (!SRClass) return;
  stopSpeak();
  if (recog) { try { recog.abort(); } catch (e) {} }
  recog = new SRClass();
  recog.lang = 'en-US';
  recog.interimResults = false;
  recog.maxAlternatives = 5;
  btn.classList.add('rec');
  out.textContent = '🎙 聞き取り中… 英語で話してください';
  out.className = 'mic-result';
  recog.onresult = e => {
    const alts = [...e.results[0]].map(a => a.transcript);
    const best = alts.map(t => ({ t, s: simScore(t, target) })).sort((a, b) => b.s - a.s)[0];
    const pct = Math.round(best.s * 100);
    const grade = best.s >= 0.8 ? '◎ すばらしい発音です！' : best.s >= 0.5 ? '○ おしい！もう少し' : '△ もう一度挑戦しよう';
    out.innerHTML = `${grade}（一致率 ${pct}%）<span class="said">　聞き取り結果:「${best.t}」</span>`;
    out.className = 'mic-result ' + (best.s >= 0.8 ? 'good' : best.s >= 0.5 ? 'mid' : 'bad');
  };
  recog.onerror = e => {
    out.textContent = e.error === 'not-allowed' ? 'マイクの使用が許可されていません（ブラウザの設定を確認）' : '聞き取れませんでした。もう一度どうぞ';
    out.className = 'mic-result bad';
  };
  recog.onend = () => btn.classList.remove('rec');
  recog.start();
}

document.getElementById('tkModeDialog').onclick = () => { tkMode = 'dialog'; tkStep = 0; setTkMode(); };
function setTkMode() {
  document.getElementById('tkModePhrase').classList.toggle('on', tkMode === 'phrase');
  document.getElementById('tkModeDialog').classList.toggle('on', tkMode === 'dialog');
  stopSpeak();
  renderTalk();
}

function renderTalk() {
  if (tkMode === 'phrase') renderPhrases();
  else renderDialog();
}

function renderPhrases() {
  const sec = PHRASES[+tkScene.value];
  const stage = document.getElementById('tkStage');
  stage.innerHTML = sec.phrases.map((p, i) => `
    <div class="ph-row" data-i="${i}">
      <div class="en">${p.en}</div>
      <div class="jp">${p.jp}</div>
      ${p.note ? `<div class="note">${p.note}</div>` : ''}
      <button class="spk" title="発音">🔊</button>
      ${SRClass ? `<button class="mic" title="発音チャレンジ">🎤</button>` : ''}
      <div class="mic-result" id="micRes${i}"></div>
    </div>`).join('');
  stage.querySelectorAll('.ph-row').forEach(row => {
    const p = sec.phrases[+row.dataset.i];
    const play = () => {
      stage.querySelectorAll('.ph-row.playing').forEach(r => r.classList.remove('playing'));
      row.classList.add('playing');
      speak(p.en, () => row.classList.remove('playing'));
    };
    row.onclick = play;
    row.querySelector('.spk').onclick = e => { e.stopPropagation(); play(); };
    const mic = row.querySelector('.mic');
    if (mic) mic.onclick = e => {
      e.stopPropagation();
      startMic(p.en, mic, row.querySelector('.mic-result'));
    };
  });
}

function renderDialog() {
  const sec = PHRASES[+tkScene.value];
  const dlg = sec.dialog;
  const stage = document.getElementById('tkStage');
  const finished = tkStep >= dlg.length;
  let html = `
    <div class="dlg-roles">
      <span class="lbl">ロール:</span>
      <span class="tk-mode">
        <button data-role="watch" class="${tkRole === 'watch' ? 'on' : ''}">見る・聞く</button>
        <button data-role="A" class="${tkRole === 'A' ? 'on' : ''}">Aを演じる</button>
        <button data-role="B" class="${tkRole === 'B' ? 'on' : ''}">Bを演じる</button>
      </span>
    </div>`;
  dlg.slice(0, tkStep).forEach((t, i) => {
    const isYou = tkRole === t.s;
    const revealed = !isYou || t.revealed;
    html += `
      <div class="bubble-row ${t.s}">
        <span class="who">${t.s}${isYou ? '（あなた）' : ''}</span>
        <div class="bubble ${isYou && !revealed ? 'yours' : ''}" data-i="${i}">
          ${isYou && !revealed
            ? `<div class="prompt">あなたの番！ 英語で言ってみて → タップで答え</div><div class="jp" style="font-size:14.5px;color:var(--ink)">${t.jp}</div>`
            : `<div class="en">${t.en}</div><div class="jp">${t.jp}</div>`}
          ${isYou && revealed && SRClass ? `<div class="mic-result" id="dlgMic${i}"></div>` : ''}
        </div>
        ${isYou && revealed && SRClass ? `<button class="btn" style="margin:6px 6px 0" data-mic="${i}">🎤 発音チャレンジ</button>` : ''}
      </div>`;
  });
  if (finished) html += `<div class="dlg-done">🎉 会話おわり！おつかれさま</div>`;
  html += `
    <div class="dlg-controls">
      <button class="btn" id="dlgReset" ${tkStep === 0 ? 'disabled' : ''}>↺ 最初から</button>
      <button class="btn primary" id="dlgNext" ${finished ? 'disabled' : ''}>${tkStep === 0 ? '▶ 会話を始める' : '次のセリフ ▶'}</button>
    </div>`;
  stage.innerHTML = html;

  stage.querySelectorAll('[data-role]').forEach(b => b.onclick = () => {
    tkRole = b.dataset.role;
    tkStep = 0;
    dlg.forEach(t => delete t.revealed);
    stopSpeak();
    renderDialog();
  });
  stage.querySelectorAll('.bubble').forEach(b => b.onclick = () => {
    const t = dlg[+b.dataset.i];
    if (tkRole === t.s && !t.revealed) {
      t.revealed = true;
      renderDialog();
      speak(t.en);
    } else {
      speak(t.en);
    }
  });
  stage.querySelectorAll('[data-mic]').forEach(b => b.onclick = () => {
    const i = +b.dataset.mic;
    startMic(dlg[i].en, b, document.getElementById('dlgMic' + i));
  });
  document.getElementById('dlgReset').onclick = () => { tkStep = 0; dlg.forEach(t => delete t.revealed); stopSpeak(); renderDialog(); };
  document.getElementById('dlgNext').onclick = () => {
    tkStep++;
    const t = dlg[tkStep - 1];
    renderDialog();
    // 相手のセリフ（または観戦モード）は自動で読み上げ
    if (tkRole === 'watch' || t.s !== tkRole) speak(t.en);
    const rows = document.querySelectorAll('.bubble-row');
    if (rows.length) rows[rows.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };
}

/* ===== トップに戻る ===== */
function goTop() {
  // 長距離のsmoothは遅く、iOSでは触ると中断されるので、遠いときは即ジャンプ
  if (window.scrollY > 1500) window.scrollTo(0, 0);
  else window.scrollTo({ top: 0, behavior: 'smooth' });
}
// タイトルクリック = ホーム（単語帳の全件一覧の先頭）に戻る
document.querySelector('header h1').onclick = () => {
  showView('list');
  searchBox.value = '';
  currentCat = 'all';
  [...chipsEl.children].forEach((x, i) => x.classList.toggle('on', i === 0));
  renderList();
  window.scrollTo(0, 0);
};
document.getElementById('toTop').onclick = goTop;

/* ===== 起動 ===== */
buildChips();
renderList();
</script>
</body>
</html>
